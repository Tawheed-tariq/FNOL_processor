[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
pythonpath = ["."]          # ← adds project root to sys.path so 'app' is importable
asyncio_mode = "auto"       # ← silences pytest-asyncio scope warning
addopts = [
    "-v",
    "--tb=short",
    "--no-header",
    "-rN",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]